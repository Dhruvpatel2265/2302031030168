<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Sustainable Transportation Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 30px auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #2c7a7b;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-size: 1em;
            font-weight: bold;
            color: #2c7a7b;
        }

        input, textarea, button {
            font-size: 1em;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 5px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #2c7a7b;
            box-shadow: 0 0 5px rgba(44, 122, 123, 0.5);
        }

        textarea {
            resize: vertical;
        }

        button {
            background-color: #2c7a7b;
            color: #ffffff;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #225e5f;
        }

        .note {
            font-size: 0.9em;
            color: #555;
        }

        @media (max-width: 768px) {
            .container {
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Us</h1>
        <form action="submit_form.php" method="POST">
            <!-- Name -->
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>

            <!-- Email -->
            <label for="email">Your Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email address" required>

            <!-- Subject -->
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="Enter the subject" required>

            <!-- Message -->
            <label for="message">Your Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>

            <!-- Submit Button -->
            <button type="submit">Send Message</button>

            <!-- Optional Note -->
            <p class="note">We value your feedback! Please allow 1-2 business days for us to respond to your inquiry.</p>
        </form>
    </div>
</body>
</html>
